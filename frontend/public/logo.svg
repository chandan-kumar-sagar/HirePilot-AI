<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Trail elements -->
  <circle cx="20" cy="80" r="3" fill="url(#trailGrad)" opacity="0.6" />
  <circle cx="30" cy="70" r="4" fill="url(#trailGrad)" opacity="0.8" />
  <path d="M10 90 L35 65" stroke="url(#trailGrad)" stroke-width="4" stroke-linecap="round" opacity="0.5" />
  
  <!-- Main Paper Airplane -->
  <path d="M35 65 L90 10 L65 85 L45 60 Z" fill="url(#planeGrad)" />
  <path d="M45 60 L90 10 L45 45 Z" fill="#ffffff" opacity="0.3" />
  <path d="M45 60 L65 85 L55 65 Z" fill="#000000" opacity="0.15" />
</svg>
